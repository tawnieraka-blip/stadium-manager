<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>إدارة ملعب الجمعية</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/dark.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/6b7bcb1d74.js" crossorigin="anonymous"></script>

</head>

<body>

<div class="container">

    <header>

        <img src="assets/logo.png" class="logo">

        <h1>إدارة ملعب الجمعية</h1>

        <div class="header-actions">

            <button id="themeBtn" class="icon-btn">
                <i class="fa-solid fa-moon"></i>
            </button>

            <a href="settings.html" class="icon-btn">
                <i class="fa-solid fa-gear"></i>
            </a>

        </div>

    </header>

    <section class="datetime">

        <div id="clock"></div>

        <div id="day"></div>

        <div id="date"></div>

    </section>

    <section class="menu">

        <a href="booking.html" class="card">

            <i class="fa-solid fa-plus"></i>

            <span>حجز جديد</span>

        </a>

        <a href="pending.html" class="card">

            <i class="fa-solid fa-hourglass-half"></i>

            <span>الحجوزات المعلقة</span>

            <div id="pendingCount">0</div>

        </a>

        <a href="confirmed.html" class="card">

            <i class="fa-solid fa-circle-check"></i>

            <span>الحجوزات المؤكدة</span>

            <div id="confirmedCount">0</div>

        </a>

        <a href="statistics.html" class="card">

            <i class="fa-solid fa-chart-column"></i>

            <span>الإحصائيات</span>

        </a>

    </section>

</div>

<script src="js/theme.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>

</html>
